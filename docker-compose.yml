services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=false

  backend:
    build: ./backend
    image: myapp-backend:latest
    command: python manage.py runserver 0.0.0.0:8000
    restart: on-failure
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - hf_cache:/root/.cache/huggingface
    env_file:
      - .env
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
      chroma:
        condition: service_started

  celery:
    image: myapp-backend:latest
    entrypoint: []
    command: celery -A settings worker -l info --concurrency=1 --pool=prefork
    restart: on-failure
    volumes:
      - ./backend:/app
      - hf_cache:/root/.cache/huggingface
    env_file:
      - .env
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
      chroma:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  chroma_data:
  hf_cache:
