services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-lazy_teacher}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/data
    environment:
      - ANONYMIZED_TELEMETRY=false
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "timeout 1 bash -c 'cat < /dev/null > /dev/tcp/localhost/8000' || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ./backend
      target: backend
    image: myapp-backend:latest
    command: python manage.py runserver 0.0.0.0:8000
    restart: on-failure
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      chroma:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G

  celery:
    build:
      context: ./backend
      target: celery
    image: myapp-celery:latest
    entrypoint: []
    command: celery -A settings worker -l info --concurrency=1 --pool=prefork --max-tasks-per-child=50
    restart: on-failure
    volumes:
      - ./backend:/app
      - hf_cache:/root/.cache/huggingface
    env_file:
      - .env
    environment:
      - MALLOC_TRIM_THRESHOLD_=65536
      - MALLOC_MMAP_THRESHOLD_=65536
    depends_on:
      backend:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      chroma:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 3G
    stop_grace_period: 30s

volumes:
  postgres_data:
  redis_data:
  chroma_data:
  hf_cache:
