upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:3000;
}

# ====================== HTTP → HTTPS======================
server {
    listen 80;
    server_name lazy-teacher.hackvisa.online;

    return 301 https://$host$request_uri;
}

# ====================== HTTPS ======================
server {
    listen 443 ssl http2;
    server_name lazy-teacher.hackvisa.online;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 50M;

    # Django collected static files
    location /static/ {
        alias /var/www/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ^~ /_next/static/ {
        alias /var/www/nextjs-static/;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~ ^/(favicon\.ico|robots\.txt|manifest\.json|.*\.(png|jpg|jpeg|gif|svg|webp|css|js))$ {
        alias /var/www/public/$1;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /admin/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Proxy everything else to Next.js frontend ---
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}