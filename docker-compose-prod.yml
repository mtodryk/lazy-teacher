services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-lazy_teacher}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  chroma:
    image: chromadb/chroma:latest
    volumes:
      - chroma_data:/data
    environment:
      - ANONYMIZED_TELEMETRY=false
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "timeout 1 bash -c 'cat < /dev/null > /dev/tcp/localhost/8000' || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      target: runtime
    image: myapp-backend:latest
    command: gunicorn settings.wsgi:application --bind 0.0.0.0:8000
    restart: unless-stopped
    volumes:
      - django_static:/app/staticfiles
      - temp_uploads:/app/temp_uploads
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      chroma:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G

  celery:
    build:
      context: ./backend
      target: runtime
    image: myapp-celery:latest
    entrypoint: []
    command: celery -A settings worker -l info --concurrency=1 --pool=prefork --max-tasks-per-child=50
    restart: unless-stopped
    volumes:
      - hf_cache:/home/django/.cache/huggingface
      - temp_uploads:/app/temp_uploads
    env_file:
      - .env
    environment:
      - MALLOC_TRIM_THRESHOLD_=65536
      - MALLOC_MMAP_THRESHOLD_=65536
    depends_on:
      backend:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      chroma:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 3G
    stop_grace_period: 30s

  frontend:
    build:
      context: ./frontend
    image: myapp-frontend:latest
    restart: unless-stopped
    volumes:
      - nextjs_static:/app/.next/static:ro
      - nextjs_public:/app/public:ro
    env_file:
      - .env
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - django_static:/var/www/static:ro
      - nextjs_static:/var/www/nextjs-static:ro
      - nextjs_public:/var/www/public:ro
      - /etc/letsencrypt/live/lazy-teacher.hackvisa.online/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      - /etc/letsencrypt/live/lazy-teacher.hackvisa.online/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  chroma_data:
  hf_cache:
  django_static:
  nextjs_static:
  nextjs_public:
  temp_uploads:
